services:
  - type: web
    name: bertogden-organize-api
    runtime: python
    plan: starter
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: DEALER_DATA_FILE
        value: /var/data/store.json
      - key: DEALER_CORS_ORIGINS
        sync: false
    disk:
      name: organize-data
      mountPath: /var/data
      sizeGB: 5

  - type: web
    name: bertogden-organize-web
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_BASE
        fromService:
          type: web
          name: bertogden-organize-api
          envVarKey: RENDER_EXTERNAL_URL
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
